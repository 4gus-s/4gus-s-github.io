  <div class="container-fluid text-center">

    <img 
        id="miImagen"
        src="pieza_files/coso0.png"
        onclick="cambiarImagen()"
        style="cursor:pointer;"
    >
 </div>
 
<script>
const imagenes = [
    "pieza_files/coso0.png",
    "pieza_files/coso1.gif",
    "pieza_files/coso2.gif",
    "pieza_files/coso3.gif"
];

let indice = 0;

function cambiarImagen() {
    indice++;
    
    if (indice >= imagenes.length) {
        indice = 0;
    }

    document.getElementById("miImagen").src = imagenes[indice];
}
</script>
