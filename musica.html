<script>
let audioActual = null;

const canciones = document.querySelectorAll(".song");

canciones.forEach(img => {

    img.addEventListener("mouseenter", () => {

        if (audioActual) {
            audioActual.pause();
            audioActual.currentTime = 0;
        }

        audioActual = new Audio(img.dataset.audio);
        audioActual.volume = 0.5;
        audioActual.play();

    });

    img.addEventListener("mouseleave", () => {

        if (audioActual) {
            audioActual.pause();
            audioActual.currentTime = 0;
        }

    });

});
</script>
